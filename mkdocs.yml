site_name: Knightmare
site_description: AlphaZero-style self-play chess engine.
site_author: Carlo Deutschmann
repo_url: https://github.com/CarloTUM/Knightmare
repo_name: CarloTUM/Knightmare
edit_uri: edit/master/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: false
            docstring_style: google

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed
  - pymdownx.snippets

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Architecture: architecture.md
  - Training: training.md
  - UCI engine: uci.md
  - API reference: api.md
  - Changelog: changelog.md
