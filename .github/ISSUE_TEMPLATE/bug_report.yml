name: Bug report
description: Something is broken or behaves unexpectedly.
labels: [bug, triage]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal command, code, or configuration that triggers the bug.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Output of `knightmare info` plus your OS.
      render: text
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: text
